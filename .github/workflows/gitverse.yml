name: Mirror to GitVerse

on:
  push:
    branches:
      - '*'
  delete:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitVerse
        run: |
          GITVERSE_URL="https://${{ secrets.GITVERSE_USER }}:${{ secrets.GITVERSE_TOKEN }}@gitverse.ru/oldzoomer/stingraytv-alice.git"
          git push --force --prune "$GITVERSE_URL" "refs/remotes/origin/*:refs/heads/*"
          git push --force --prune "$GITVERSE_URL" "refs/tags/*:refs/tags/*"
